# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    environment: DEV
    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: https://dbc-f6ab2eda-6073.cloud.databricks.com/
      DATARICKS_CLIENT_ID: 8ee5d7b6-f3e0-495f-b85c-db0eb69b4ee2

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      
      - name: Install Databricks CLI
        # uses: databricks/setup-cli@main
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: update repo
        run: databricks repos update /Workspace/Users/tamraj.dhvaj@zohomail.in/FederatedIdentityDatabricks/ --branch dev

      - name: Who is logged?
        run: databricks current-user me

      - name: Validate bundle
        run: databricks bundle validate --target dev
      
      - name: Deploy bundle
        run: databricks bundle deploy --target dev
